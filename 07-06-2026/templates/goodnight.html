<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Good Night</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            background: #0a0015;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Georgia', serif;
            overflow: hidden;
        }

        /* Stars */
        .stars {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle var(--duration) ease-in-out infinite;
            opacity: 0;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        /* Moon */
        .moon {
            position: fixed;
            top: 60px;
            right: 100px;
            width: 90px;
            height: 90px;
            background: radial-gradient(circle at 35% 35%, #fffde7, #ffd54f);
            border-radius: 50%;
            box-shadow: 0 0 40px 15px rgba(255, 213, 79, 0.3),
                        0 0 80px 30px rgba(255, 213, 79, 0.15);
            animation: moonGlow 4s ease-in-out infinite;
        }

        .moon::before {
            content: '';
            position: absolute;
            top: 12px; left: 18px;
            width: 20px; height: 20px;
            background: rgba(255, 193, 7, 0.25);
            border-radius: 50%;
        }

        .moon::after {
            content: '';
            position: absolute;
            top: 38px; left: 30px;
            width: 12px; height: 12px;
            background: rgba(255, 193, 7, 0.2);
            border-radius: 50%;
        }

        @keyframes moonGlow {
            0%, 100% { box-shadow: 0 0 40px 15px rgba(255, 213, 79, 0.3), 0 0 80px 30px rgba(255, 213, 79, 0.15); }
            50% { box-shadow: 0 0 60px 25px rgba(255, 213, 79, 0.45), 0 0 100px 50px rgba(255, 213, 79, 0.2); }
        }

        /* Clouds */
        .cloud {
            position: fixed;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 50px;
            animation: drift linear infinite;
        }

        .cloud::before, .cloud::after {
            content: '';
            position: absolute;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 50%;
        }

        .cloud-1 { width: 180px; height: 40px; top: 80px; animation-duration: 35s; }
        .cloud-1::before { width: 80px; height: 60px; top: -30px; left: 25px; }
        .cloud-1::after  { width: 60px; height: 50px; top: -20px; left: 85px; }

        .cloud-2 { width: 120px; height: 30px; top: 160px; animation-duration: 50s; animation-delay: -15s; opacity: 0.6; }
        .cloud-2::before { width: 55px; height: 45px; top: -22px; left: 18px; }
        .cloud-2::after  { width: 40px; height: 35px; top: -14px; left: 60px; }

        @keyframes drift {
            from { transform: translateX(-300px); }
            to   { transform: translateX(110vw); }
        }

        /* Main card */
        .card {
            position: relative;
            text-align: center;
            padding: 60px 70px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            backdrop-filter: blur(10px);
            max-width: 520px;
            animation: fadeUp 1.4s ease forwards;
            opacity: 0;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .emoji-moon {
            font-size: 64px;
            display: block;
            margin-bottom: 20px;
            animation: sway 3s ease-in-out infinite;
        }

        @keyframes sway {
            0%, 100% { transform: rotate(-5deg); }
            50% { transform: rotate(5deg); }
        }

        h1 {
            font-size: 2.6rem;
            font-weight: normal;
            color: #e8d5ff;
            letter-spacing: 2px;
            margin-bottom: 16px;
            text-shadow: 0 0 30px rgba(180, 120, 255, 0.5);
        }

        .subtitle {
            font-size: 1rem;
            color: rgba(200, 180, 255, 0.65);
            letter-spacing: 1px;
            line-height: 1.8;
            margin-bottom: 36px;
        }

        .divider {
            width: 60px;
            height: 1px;
            background: linear-gradient(to right, transparent, rgba(180,120,255,0.5), transparent);
            margin: 0 auto 32px;
        }

        .quote {
            font-style: italic;
            font-size: 0.92rem;
            color: rgba(200, 180, 255, 0.5);
            line-height: 1.9;
        }

        /* Shooting stars */
        .shoot {
            position: fixed;
            width: 2px;
            height: 2px;
            background: white;
            border-radius: 50%;
            animation: shoot var(--dur) ease-in infinite;
            animation-delay: var(--delay);
            opacity: 0;
        }

        .shoot::after {
            content: '';
            position: absolute;
            top: 0; right: 2px;
            width: 80px; height: 1px;
            background: linear-gradient(to left, white, transparent);
        }

        @keyframes shoot {
            0%   { opacity: 0; transform: translate(0, 0) rotate(-35deg); }
            5%   { opacity: 1; }
            60%  { opacity: 0; transform: translate(300px, 200px) rotate(-35deg); }
            100% { opacity: 0; transform: translate(300px, 200px) rotate(-35deg); }
        }
    </style>
</head>
<body>

    <div class="stars" id="stars"></div>

    <div class="moon"></div>
    <div class="cloud cloud-1"></div>
    <div class="cloud cloud-2"></div>

    <!-- Shooting stars -->
    <div class="shoot" style="top:15%; left:20%; --dur:6s; --delay:1s;"></div>
    <div class="shoot" style="top:30%; left:55%; --dur:8s; --delay:4s;"></div>
    <div class="shoot" style="top:10%; left:70%; --dur:7s; --delay:7s;"></div>

    <div class="card">
        <span class="emoji-moon">🌙</span>
        <h1>Good Night</h1>
        <p class="subtitle">The day is done, the stars are out<br>let your mind rest now.</p>
        <div class="divider"></div>
        <p class="quote">
            "Sleep is the golden chain<br>
            that ties health and our bodies together."<br>
            <br>— Thomas Dekker
        </p>
    </div>

    <script>
        // Generate random stars
        const container = document.getElementById('stars');
        for (let i = 0; i < 160; i++) {
            const s = document.createElement('div');
            s.className = 'star';
            const size = Math.random() * 2.5 + 0.5;
            s.style.cssText = `
                width: ${size}px;
                height: ${size}px;
                top: ${Math.random() * 100}%;
                left: ${Math.random() * 100}%;
                --duration: ${Math.random() * 4 + 2}s;
                animation-delay: ${Math.random() * 5}s;
            `;
            container.appendChild(s);
        }
    </script>
</body>
</html>
