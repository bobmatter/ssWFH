<!DOCTYPE html>
<html>
<head>
    <title>Form Data</title>
</head>
<body>
    <h2>Submitted Form Data</h2>
    {% if form_data %}
        <table border="1" cellpadding="8">
            <tr>
                <th>Key</th>
                <th>Value</th>
            </tr>
            {% for key, value in form_data.items() %}
            <tr>
                <td>{{ key }}</td>
                <td>{{ value }}</td>
            </tr>
            {% endfor %}
        </table>
    {% else %}
        <p>No form data found. Submit the form first.</p>
    {% endif %}
</body>
</html>
